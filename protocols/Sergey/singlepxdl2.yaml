name: SinglePXDL2
description: Single hardware-connected pixel sweep. dark_first. No pixel or LED relay
  switching.
version: 1
skip_relay_cleanup: true
parameters:
  hardware_switching: none
  led_wavelength: none
steps:
- action: smu/connect
  params:
    channel: 1
    mock: false
- action: smu/connect
  params:
    channel: 2
    mock: false
- action: smu/output
  params:
    channel: 1
    enabled: false
- action: wait
  params:
    seconds: 1
- action: smu/configure
  params:
    channel: 2
    compliance: 0.1
    compliance_type: CURR
    nplc: 5
- action: smu/source-mode
  params:
    channel: 2
    mode: VOLT
- action: smu/sweep
  params:
    channel: 2
    start: -1
    stop: 1
    points: 50
    delay: 0.05
    sweep_type: double
    direction: forward
    keep_output_on: false
  capture_as: dark_iv_data
- action: data/save
  params:
    data: $dark_iv_data
    filename: TEST_DARK
- action: smu/configure
  params:
    channel: 1
    compliance: 9
    compliance_type: VOLT
    nplc: 5
- action: smu/source-mode
  params:
    channel: 1
    mode: CURR
- action: smu/set
  params:
    channel: 1
    value: 0.1105949
- action: smu/output
  params:
    channel: 1
    enabled: true
- action: wait
  params:
    seconds: 2
- action: smu/configure
  params:
    channel: 2
    compliance: 0.1
    compliance_type: CURR
    nplc: 5
- action: smu/source-mode
  params:
    channel: 2
    mode: VOLT
- action: smu/sweep
  params:
    channel: 2
    start: -1
    stop: 1
    points: 50
    delay: 0.05
    sweep_type: double
    direction: forward
    keep_output_on: false
  capture_as: light_iv_data
- action: data/save
  params:
    data: $light_iv_data
    filename: TEST_LIGHT
- action: smu/output
  params:
    channel: 2
    enabled: false
- action: smu/output
  params:
    channel: 1
    enabled: false
